name: Publish to Google Play

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.jks

      - name: Write local.properties
        shell: bash
        run: |
          printf 'release.storeFile=%s\n' "${{ github.workspace }}/release.jks" > local.properties
          printf 'release.storePassword=%s\n' '${{ secrets.KEYSTORE_PASSWORD }}' >> local.properties
          printf 'release.keyAlias=%s\n' '${{ secrets.KEY_ALIAS }}' >> local.properties
          printf 'release.keyPassword=%s\n' '${{ secrets.KEY_PASSWORD }}' >> local.properties

      - name: Verify keystore
        run: keytool -list -keystore $GITHUB_WORKSPACE/release.jks -alias adagio -storepass '${{ secrets.KEYSTORE_PASSWORD }}'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Generate Play Store release notes from tag commit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p distribution/whatsnew
          # Pull the tag-commit message, strip the "Release vX.Y.Z: " prefix
          # (redundant — Play already shows the version), drop Co-Authored-By and
          # other git trailers, then cap at Play's 500-char per-locale limit.
          notes=$(git log -1 --pretty=%B HEAD \
            | sed -E '1 s/^Release v[0-9]+(\.[0-9]+)*:[[:space:]]*//' \
            | sed -E '/^(Co-[Aa]uthored-[Bb]y|Signed-off-by|Closes|Fixes|Refs):/d' \
            | awk 'BEGIN{blank=0} /^$/{blank++; if(blank<=1)print; next} {blank=0; print}' \
            | head -c 500)
          if [ -z "${notes// /}" ]; then
            notes="Bug fixes and improvements."
          fi
          printf '%s\n' "$notes" > distribution/whatsnew/whatsnew-en-US.txt
          echo "--- whatsnew-en-US.txt ---"
          cat distribution/whatsnew/whatsnew-en-US.txt

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.adagiostream.android
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: alpha
          status: completed
          whatsNewDirectory: distribution/whatsnew/
