name: Publish to Google Play

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.jks

      - name: Write local.properties
        shell: bash
        run: |
          printf 'release.storeFile=%s\n' "${{ github.workspace }}/release.jks" > local.properties
          printf 'release.storePassword=%s\n' '${{ secrets.KEYSTORE_PASSWORD }}' >> local.properties
          printf 'release.keyAlias=%s\n' '${{ secrets.KEY_ALIAS }}' >> local.properties
          printf 'release.keyPassword=%s\n' '${{ secrets.KEY_PASSWORD }}' >> local.properties

      - name: Verify keystore
        run: keytool -list -keystore $GITHUB_WORKSPACE/release.jks -alias adagio -storepass '${{ secrets.KEYSTORE_PASSWORD }}'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.adagiostream.android
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: draft
